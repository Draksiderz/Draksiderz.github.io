<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рандомайзер для выпускного</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>

        @font-face {
            font-family: 'Phorssa';
            src: url('https://fonts.cdnfonts.com/s/85065/Phorssa.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Nuklear';
            src: url('https://fonts.cdnfonts.com/s/85065/Nuklear.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'The Milligram';
            src: url('https://myfonts.ru/font/milligram') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(ellipse at center, #0a0f2e 0%, #030514 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Лёгкая сетка на фоне для киберпанк-атмосферы */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .header {
            margin-bottom: 30px;
            position: relative;
        }

        h1 {
            font-family: 'Phorssa', 'Montserrat', cursive;
            font-size: 5.5rem;
            color: #ffffff;
            text-shadow:
                0 0 10px #00ffff,
                0 0 30px #7b2fff,
                0 0 60px #3b0fff;
            letter-spacing: 3px;
            margin-bottom: 5px;
            animation: glow 2s infinite alternate;
            line-height: 1;
            text-transform: uppercase;
        }

        .hoo {
            font-family: 'Nuklear', 'Montserrat', cursive;
            font-size: 6rem;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow:
                0 0 10px #00ffff,
                0 0 30px #7b2fff,
                0 0 60px #3b0fff;
            letter-spacing: 3px;
            margin-bottom: 5px;
            animation: glow 2s infinite alternate;
            line-height: 1;
        }

        .subtitle {
            font-size: 1.8rem;
            color: #00d4ff;
            font-weight: 500;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.7);
        }

        .randomizer-box {
            background: linear-gradient(135deg, rgba(15, 15, 50, 0.8), rgba(25, 10, 55, 0.8));
            border-radius: 25px;
            box-shadow:
                0 0 25px rgba(0, 200, 255, 0.3),
                0 15px 35px rgba(0, 0, 0, 0.6);
            padding: 40px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(0, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .randomizer-box::before {
            content: "";
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(45deg,
                    #00ffff, #7b2fff, #00d4ff, #8b5cf6,
                    #00ffff, #7b2fff, #00d4ff, #8b5cf6);
            background-size: 400%;
            border-radius: 30px;
            z-index: -1;
            animation: gradient 8s linear infinite;
            filter: blur(5px);
            opacity: 0.7;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            background: rgba(10, 10, 40, 0.5);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            min-width: 220px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        label {
            display: block;
            color: #00d4ff;
            font-size: 1.1rem;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0, 212, 255, 0.6);
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #00ffff;
            border-radius: 12px;
            font-size: 1.2rem;
            background: rgba(5, 5, 25, 0.8);
            text-align: center;
            color: #00ffff;
            font-weight: bold;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #7b2fff;
            box-shadow:
                0 0 15px rgba(0, 255, 255, 0.5),
                0 0 30px rgba(123, 47, 255, 0.4);
        }

        button {
            background: linear-gradient(to right, #3b0fff, #00d4ff);
            color: #ffffff;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow:
                0 0 15px rgba(0, 212, 255, 0.5),
                0 8px 20px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 10px auto;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg,
                    transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: buttonShine 3s infinite;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow:
                0 0 25px rgba(0, 255, 255, 0.8),
                0 12px 30px rgba(0, 0, 0, 0.7);
        }

        button:active {
            transform: translateY(1px);
        }

        .result-container {
            margin: 30px 0;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .result-label {
            font-size: 1.8rem;
            color: #00d4ff;
            margin-bottom: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.7);
        }

        .result {
            font-size: 6rem;
            font-weight: bold;
            color: #00ffff;
            background: rgba(0, 20, 50, 0.6);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 0 40px rgba(0, 255, 255, 0.5),
                0 10px 30px rgba(0, 0, 0, 0.4);
            animation: pulse 2s infinite;
            margin: 0 auto;
            position: relative;
            font-family: 'Montserrat', sans-serif;
            border: 2px solid rgba(0, 255, 255, 0.4);
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .decoration {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .decoration span {
            font-size: 3rem;
            color: #00ffff;
            opacity: 0.8;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(0, 255, 255, 0.6));
        }

        .decoration span:nth-child(2) {
            animation-delay: 0.5s;
            color: #7b2fff;
            filter: drop-shadow(0 0 8px rgba(123, 47, 255, 0.6));
        }

        .decoration span:nth-child(3) {
            animation-delay: 1s;
        }

        .decoration span:nth-child(4) {
            animation-delay: 1.5s;
            color: #7b2fff;
            filter: drop-shadow(0 0 8px rgba(123, 47, 255, 0.6));
        }

        .decoration span:nth-child(5) {
            animation-delay: 2s;
        }

        .history {
            background: rgba(10, 10, 40, 0.6);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        .history h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 6px rgba(0, 212, 255, 0.5);
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-height: 120px;
            overflow-y: auto;
            padding: 10px;
        }

        .history-item {
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-family: 'Montserrat', sans-serif;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.2);
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }

        .copyright {
            margin-top: 20px;
            color: #8b5cf6;
            font-size: 0.9rem;
            opacity: 0.8;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(139, 92, 246, 0.5);
        }

        @keyframes glow {
            from {
                text-shadow:
                    0 0 10px #00ffff,
                    0 0 30px #7b2fff,
                    0 0 60px #3b0fff;
            }
            to {
                text-shadow:
                    0 0 20px #00ffff,
                    0 0 50px #a855f7,
                    0 0 80px #3b0fff;
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow:
                    0 0 40px rgba(0, 255, 255, 0.5),
                    0 0 0 0 rgba(0, 255, 255, 0.6);
            }
            70% {
                transform: scale(1.05);
                box-shadow:
                    0 0 60px rgba(0, 255, 255, 0.8),
                    0 0 0 25px rgba(0, 255, 255, 0);
            }
            100% {
                transform: scale(1);
                box-shadow:
                    0 0 40px rgba(0, 255, 255, 0.5),
                    0 0 0 0 rgba(0, 255, 255, 0);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
            100% {
                transform: translateY(0px);
            }
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 400% 50%;
            }
        }

        @keyframes buttonShine {
            0% {
                left: -50%;
            }
            100% {
                left: 150%;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 4rem;
            }

            .hoo {
                font-size: 3rem;
            }

            .subtitle {
                font-size: 1.4rem;
            }

            .randomizer-box {
                padding: 30px 20px;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }

            .result {
                font-size: 4rem;
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ВЫПУСКНОО '26</h1>
            <div class="subtitle">+ vibe activity</div>
        </div>

        <div class="randomizer-box">
            <div class="controls">
                <div class="input-group">
                    <label for="participants">Количество участников</label>
                    <input type="number" id="participants" min="2" max="1000" value="100">
                </div>

                <div class="input-group">
                    <label for="from">От номера</label>
                    <input type="number" id="from" min="1" max="999" value="1">
                </div>

                <div class="input-group">
                    <label for="to">До номера</label>
                    <input type="number" id="to" min="2" max="1000" value="100">
                </div>
            </div>

            <button id="generate-btn">
                Выбрать победителя
            </button>

            <div class="result-container">
                <div class="result-label">Победитель:</div>
                <div class="result" id="result">?</div>
            </div>

            <div class="decoration">
                <span>🎓</span>
                <span>🎉</span>
                <span>🏆</span>
                <span>🥂</span>
                <span>✨</span>
            </div>
        </div>

        <div class="history">
            <h3>История выбора</h3>
            <div class="history-list" id="history"></div>
        </div>

        <div class="copyright">© Выпускной HOO - 2026</div>
    </div>

    <script>
        const participantsInput = document.getElementById('participants');
        const fromInput = document.getElementById('from');
        const toInput = document.getElementById('to');
        const generateBtn = document.getElementById('generate-btn');
        const resultElement = document.getElementById('result');
        const historyElement = document.getElementById('history');

        let history = [];


        participantsInput.addEventListener('change', function() {
            const value = Math.min(Math.max(parseInt(this.value), 2), 1000);
            this.value = value;
            toInput.value = value;
            toInput.max = value;
            fromInput.max = value - 1;
        });

        fromInput.addEventListener('change', function() {
            const value = Math.min(Math.max(parseInt(this.value), 1), parseInt(toInput.value) - 1);
            this.value = value;
            toInput.min = value + 1;
        });

        toInput.addEventListener('change', function() {
            const value = Math.min(Math.max(parseInt(this.value), parseInt(fromInput.value) + 1), 1000);
            this.value = value;
            fromInput.max = value - 1;
            participantsInput.value = value;
        });

        generateBtn.addEventListener('click', generateRandom);

        function generateRandom() {
            const from = parseInt(fromInput.value);
            const to = parseInt(toInput.value);

            if (from >= to) {
                alert("Начальный номер должен быть меньше конечного");
                return;
            }


            resultElement.textContent = "...";
            resultElement.style.animation = "none";
            setTimeout(() => {
                resultElement.style.animation = "pulse 2s infinite";
            }, 10);


            setTimeout(() => {
                const randomNumber = Math.floor(Math.random() * (to - from + 1)) + from;
                resultElement.textContent = randomNumber;


                history.unshift(randomNumber);
                if (history.length > 10) history.pop();

                updateHistory();
            }, 800);
        }

        function updateHistory() {
            historyElement.innerHTML = '';
            history.forEach(num => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.textContent = num;
                historyElement.appendChild(item);
            });
        }


        participantsInput.dispatchEvent(new Event('change'));
    </script>
</body>
</html>
